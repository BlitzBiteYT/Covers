# .github/workflows/update.yml
# ─────────────────────────────────────────────────────────────────────────────
# Anime Cover Database — Daily Sync
#
# Runs every day at 06:00 UTC (adjust cron as needed).
# Can also be triggered manually from the Actions tab.
#
# Required repo setting:
#   Settings → Actions → General → Workflow permissions
#   → "Read and write permissions"  (so the bot can commit database.json)
# ─────────────────────────────────────────────────────────────────────────────

name: Update Anime Cover Database

on:
  schedule:
        - cron: "*/15 * * * *"

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Grant the GITHUB_TOKEN permission to push commits
permissions:
  contents: write

jobs:
  sync:
    name: Sync & Commit database.json
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # FIX 2: Force Node.js 24 for all actions to silence the deprecation
    # warning and stay ahead of the June 2nd, 2026 forced cutover.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONIOENCODING: utf-8

    steps:
      # ── 1. Checkout the repository ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Set up Python ────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          # FIX 1: cache: pip now works because requirements.txt exists in repo
          cache: "pip"

      # ── 3. Install dependencies ─────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Run the scraper ──────────────────────────────────────────────────
      - name: Run scraper.py
        run: python scraper.py

      # ── 5. Check whether database.json actually changed ─────────────────────
      # IMPORTANT: git diff only detects changes to already-tracked files.
      # A brand-new database.json shows as "untracked", not a diff.
      # git status --porcelain catches both new files AND modifications.
      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain database.json)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      # ── 6. Commit & push only when there are real changes ───────────────────
      - name: Commit updated database
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add database.json

          ENTRY_COUNT=$(python - <<'EOF'
          import json
          try:
              data = json.load(open("database.json"))
              print(len(data) if isinstance(data, list) else len(data))
          except Exception:
              print("?")
          EOF
          )
          TIMESTAMP=$(date -u "+%Y-%m-%d %H:%M UTC")

          git commit -m "chore(db): sync anime covers — ${ENTRY_COUNT} entries [${TIMESTAMP}]"
          git push

      # ── 7. Skip message when nothing changed ────────────────────────────────
      - name: No changes detected
        if: steps.changes.outputs.changed == 'false'
        run: echo "database.json is already up-to-date. Nothing to commit."
